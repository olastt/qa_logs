name: QA Logs (Glitchtip)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: "Что запустить"
        required: true
        type: choice
        options:
          - "🚦 Проверить релиз"
          - "📊 Сводка — что нового"
      project:
        description: "Проект (полный список — шаг «Список проектов»)"
        required: true
        type: choice
        default: "ВСЕ ПРОЕКТЫ"
        options:
          - ВСЕ ПРОЕКТЫ
          # Релиз test ↔ stage/production
          - vetmanager-extjs
          - hetzner-mobilebackend
          - hetzner-flutter-doctor-app
          - hetzner-vetmanager-link
          - hetzner-webapps-widgets
          - selectel-webapps-widgets
          # Сводка Selectel
          - selectel-vetmanager-extjs-production
          - selectel-flutter-doctor-app-production
          - selectel-webappswidgets-production
          - selectel-webappswidgets-test
          - webapps-widgets
          # Сводка Hetzner
          - hetzner-flutter-doctor-app-production
          - hetzner-flutter-doctor-app-test
          - hetzner-mobilebackend-production
          - hetzner-mobilebackend-test
          - hetzner-vetmanager-extjs-production
          - hetzner-vetmanager-extjs-review
          - hetzner-vetmanager-extjs-stage
          - hetzner-vetmanager-extjs-test
          - hetzner-vetmanager-link-production
          - hetzner-vetmanager-link-test
          - hetzner-webappswidgets-production
          - hetzner-webappswidgets-test
      notify_bitrix:
        description: "Отправить в Bitrix24"
        required: true
        default: true
        type: boolean
  schedule:
    - cron: "0 7 * * 1-5"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONPATH: src

jobs:
  qa-release-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Force Node.js 24
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: List projects
        env:
          PYTHONPATH: src
        run: |
          echo "## Проекты QA Bot" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          qa-bot projects | tee projects.txt
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "В поле **project** укажите id из списка или \`ВСЕ ПРОЕКТЫ\`." >> $GITHUB_STEP_SUMMARY

      - name: Resolve command
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ACTION="${{ github.event.inputs.action }}"
            PROJECT="${{ github.event.inputs.project }}"
            NOTIFY="${{ github.event.inputs.notify_bitrix }}"
          else
            ACTION="🚦 Проверить релиз"
            PROJECT="vetmanager-extjs"
            NOTIFY="true"
          fi

          if [[ "$ACTION" == *"Проверить релиз"* ]]; then
            CMD="release"
          else
            CMD="summary"
          fi

          if [ "$PROJECT" = "ВСЕ ПРОЕКТЫ" ]; then
            ALL_PROJECTS=true
          else
            ALL_PROJECTS=false
          fi

          echo "command=$CMD" >> $GITHUB_OUTPUT
          echo "project=$PROJECT" >> $GITHUB_OUTPUT
          echo "all=$ALL_PROJECTS" >> $GITHUB_OUTPUT
          echo "notify=$NOTIFY" >> $GITHUB_OUTPUT
          echo "needs_surge=true" >> $GITHUB_OUTPUT

      - name: Validate action and project
        if: steps.params.outputs.all != 'true'
        env:
          PYTHONPATH: src
        run: |
          python -c "
          from qa_release_bot.projects import validate_command_project
          validate_command_project('${{ steps.params.outputs.command }}', '${{ steps.params.outputs.project }}')
          "

      - name: Run qa-bot
        id: run
        env:
          GLITCHTIP_HETZNER_URL: ${{ secrets.GLITCHTIP_HETZNER_URL }}
          GLITCHTIP_HETZNER_TOKEN: ${{ secrets.GLITCHTIP_HETZNER_TOKEN }}
          GLITCHTIP_SELECTEL_URL: ${{ secrets.GLITCHTIP_SELECTEL_URL }}
          GLITCHTIP_SELECTEL_TOKEN: ${{ secrets.GLITCHTIP_SELECTEL_TOKEN }}
          GLITCHTIP_ORG_SLUG: ${{ secrets.GLITCHTIP_ORG_SLUG }}
          POLL_INTERVAL_SEC: "300"
          STATE_DB_PATH: data/state.db
        run: |
          trim() { printf '%s' "$1" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          export GLITCHTIP_HETZNER_URL="$(trim "$GLITCHTIP_HETZNER_URL")"
          export GLITCHTIP_HETZNER_TOKEN="$(trim "$GLITCHTIP_HETZNER_TOKEN")"
          export GLITCHTIP_SELECTEL_URL="$(trim "$GLITCHTIP_SELECTEL_URL")"
          export GLITCHTIP_SELECTEL_TOKEN="$(trim "$GLITCHTIP_SELECTEL_TOKEN")"
          export GLITCHTIP_ORG_SLUG="$(trim "${GLITCHTIP_ORG_SLUG:-vetmanager}")"
          if [ -z "$GLITCHTIP_ORG_SLUG" ]; then
            export GLITCHTIP_ORG_SLUG=vetmanager
          fi
          set -o pipefail
          python scripts/github_actions_runner.py \
            "${{ steps.params.outputs.command }}" \
            "${{ steps.params.outputs.project }}" \
            --no-stack 2>&1 | tee run.log

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-${{ steps.params.outputs.command }}-${{ steps.params.outputs.project }}-${{ github.run_number }}
          path: |
            reports/*.html
            reports/*.md
            reports/ci_message*.txt
            reports/ci_meta*.json
            reports/ci_surge.json
            run.log
          if-no-files-found: ignore

      - name: Deploy HTML to Surge
        id: surge
        if: always() && steps.params.outputs.needs_surge == 'true' && steps.run.outcome == 'success'
        env:
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: |
          if [ -z "$SURGE_TOKEN" ]; then
            echo "SURGE_TOKEN secret is required"
            exit 1
          fi
          SURGE_TOKEN="$(echo -n "$SURGE_TOKEN" | tr -d '[:space:]')"
          npm install -g surge@latest
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          jobs = json.loads(Path("reports/ci_surge.json").read_text(encoding="utf-8"))
          urls = []
          for job in jobs:
              html = job.get("html_path") or ""
              domain = (job.get("domain") or "").strip()
              if not html or not domain or not Path(html).is_file():
                  continue
              pub = Path("surge-pub") / job["project_id"]
              pub.mkdir(parents=True, exist_ok=True)
              (pub / "index.html").write_bytes(Path(html).read_bytes())
              subprocess.run(
                  ["surge", str(pub), domain, "--token", os.environ["SURGE_TOKEN"]],
                  check=True,
              )
              urls.append(f"https://{domain}")
          Path("reports/surge_urls.txt").write_text("\n".join(urls), encoding="utf-8")
          print("Deployed:", urls)
          if not urls:
              raise SystemExit("No HTML reports deployed to Surge")
          PY

      - name: Patch Bitrix message with report URLs
        if: always() && steps.run.outcome == 'success'
        env:
          PYTHONPATH: src
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          from qa_release_bot.run_facade import notify_with_url

          out = Path("reports")
          if not (out / "ci_surge.json").is_file():
              raise SystemExit(0)
          surge = json.loads((out / "ci_surge.json").read_text(encoding="utf-8"))
          url_by_project: dict[str, str] = {}
          urls_file = out / "surge_urls.txt"
          if urls_file.is_file():
              deployed = [
                  u.strip()
                  for u in urls_file.read_text(encoding="utf-8").splitlines()
                  if u.strip()
              ]
              for i, job in enumerate(surge):
                  if i < len(deployed):
                      url_by_project[job["project_id"]] = deployed[i]

          parts = []
          for job in surge:
              pid = job["project_id"]
              meta_path = out / f"ci_meta_{pid}.json"
              if not meta_path.is_file():
                  continue
              meta = json.loads(meta_path.read_text(encoding="utf-8"))
              text = str(meta.get("notify_text", ""))
              domain = (job.get("domain") or meta.get("surge_domain") or "").strip()
              url = url_by_project.get(pid) or (f"https://{domain}" if domain else "")
              parts.append(notify_with_url(text, url))

          if parts:
              (out / "ci_message.txt").write_text("\n\n".join(parts), encoding="utf-8")
          PY

      - name: Send Bitrix24 notification
        if: always() && steps.params.outputs.notify == 'true'
        continue-on-error: true
        env:
          PYTHONPATH: src
          BITRIX_WEBHOOK_URL: ${{ secrets.BITRIX_WEBHOOK_URL }}
          BITRIX_CHAT_ID: ${{ secrets.BITRIX_CHAT_ID }}
        run: |
          python3 - <<'EOF'
          import sys
          from pathlib import Path

          sys.path.insert(0, "scripts")
          from bitrix_notify import send_message

          if Path("reports/ci_message.txt").is_file():
              message = Path("reports/ci_message.txt").read_text(encoding="utf-8").strip()
          else:
              log_tail = ""
              if Path("run.log").is_file():
                  log_tail = Path("run.log").read_text(encoding="utf-8")[-800:]
              message = "❌ QA Bot — сбой\n" + (log_tail or "см. лог Actions")

          if message:
              send_message(message)
          EOF
