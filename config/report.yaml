# Пары окружений test ↔ stage для сравнительного QA-отчёта

comparisons:
  - name: vetmanager-extjs
    instance: hetzner
    test_slug: vetmanager-extjs-test
    stage_slug: vetmanager-extjs-stage

# Сводка по одному проекту: qa-bot summary {id}
# id = {instance}-{slug} или короткий алиас из cli_aliases

summary_watchlist:
  selectel:
    - vetmanager-extjs-production
    - flutter-doctor-app-production
    - webappswidgets-production
    - webappswidgets-test
  hetzner:
    - flutter-doctor-app-production
    - flutter-doctor-app-test
    - mobilebackend-production
    - mobilebackend-test
    - vetmanager-extjs-production
    - vetmanager-extjs-review
    - vetmanager-extjs-stage
    - vetmanager-extjs-test
    - vetmanager-link-production
    - vetmanager-link-test
    - webappswidgets-production
    - webappswidgets-test

# Короткие имена CLI → selectel-… / hetzner-…
cli_aliases:
  webapps-widgets: selectel-webappswidgets-test

# Доп. записи (если нужны вне watchlist)
summaries: []

# stats_period передаётся в API Glitchtip (24h, 14d, …)
stats_period: 14d
issue_query: is:unresolved

# Лимиты строк в отчёте (остальное — «… ещё N»)
report_limits:
  max_critical: 20
  max_new_in_stage: 20
  max_regressions: 20
  max_env_only_list: 30
  max_infra: 15
  max_noise: 10
  title_max_len: 90

# Куда сохранять .txt и .pdf при `qa-release-bot report --legacy` (без -o)
output_dir: reports

# Снапшоты issues: snapshots/YYYY-MM-DD_{test|stage}.json
snapshots_dir: snapshots

# Для регрессий: first_seen на stage позже этой даты (опционально)
# last_deploy_date: 2026-05-12

# API Glitchtip (429 Too Many Requests)
api:
  max_retries: 8
  retry_base_sec: 3
  delay_between_requests_sec: 1
  enrich_stack: true
  enrich_stack_max_issues: 25
  enrich_stack_delay_sec: 0.3
