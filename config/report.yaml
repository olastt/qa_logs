# Релиз: сравнение test ↔ stage (или test ↔ production, если stage нет в Glitchtip)

comparisons:
  - name: hetzner-vetmanager-extjs
    instance: hetzner
    test_slug: vetmanager-extjs-test
    stage_slug: vetmanager-extjs-stage
  - name: hetzner-mobilebackend
    instance: hetzner
    test_slug: mobilebackend-test
    stage_slug: mobilebackend-production
  - name: hetzner-flutter-doctor-app
    instance: hetzner
    test_slug: flutter-doctor-app-test
    stage_slug: flutter-doctor-app-production
  - name: hetzner-vetmanager-link
    instance: hetzner
    test_slug: vetmanager-link-test
    stage_slug: vetmanager-link-production
  - name: hetzner-webapps-widgets
    instance: hetzner
    test_slug: webappswidgets-test
    stage_slug: webappswidgets-production
  - name: selectel-webapps-widgets
    instance: selectel
    test_slug: webappswidgets-test
    stage_slug: webappswidgets-production

# Сводка по одному проекту: qa-bot summary {id}
# id = {instance}-{slug}  →  qa-bot projects

summary_watchlist:
  selectel:
    - vetmanager-extjs-production
    - flutter-doctor-app-production
    - webappswidgets-production
    - webappswidgets-test
  hetzner:
    - flutter-doctor-app-production
    - flutter-doctor-app-test
    - mobilebackend-production
    - mobilebackend-test
    - vetmanager-extjs-production
    - vetmanager-extjs-review
    - vetmanager-extjs-stage
    - vetmanager-extjs-test
    - vetmanager-link-production
    - vetmanager-link-test
    - webappswidgets-production
    - webappswidgets-test

cli_aliases:
  summary:
    webapps-widgets: selectel-webappswidgets-test
  release:
    vetmanager-extjs: hetzner-vetmanager-extjs

summaries: []

stats_period: 14d
issue_query: is:unresolved

report_limits:
  max_critical: 20
  max_new_in_stage: 20
  max_regressions: 20
  max_env_only_list: 30
  max_infra: 15
  max_noise: 10
  title_max_len: 90

output_dir: reports
snapshots_dir: snapshots

api:
  max_retries: 8
  retry_base_sec: 3
  delay_between_requests_sec: 1
  enrich_stack: true
  enrich_stack_max_issues: 25
  enrich_stack_delay_sec: 0.3
